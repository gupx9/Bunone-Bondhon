<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Bunone Bondhon</title>
    <link rel="icon" type="image/jpg" href="{{ url_for('static', filename='logo.jpg') }}">
    <!-- adding bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-bg">
<div class="container mt-5">
    <div class="auth-box">
        <!-- Flash messages block -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
        <h2 class="text-center">Login</h2>
        <!-- <?php if (!empty($msg)) echo "<div class='alert alert-danger'>$msg</div>"; ?> -->
        <form action="{{url_for('login')}}" method="post" class="mx-auto" style="max-width:400px;">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="email" type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input id="password" type="password" name="password" class="form-control" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <p class="text-center mt-3">Don't have an account? <a href="{{url_for('register')}}">Register here</a></p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
